x-airflow-common: &airflow-common
  build:
    context: ./docker
    dockerfile: Dockerfile.airflow
  env_file:
    - .env
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: ${AIRFLOW__DATABASE__SQL_ALCHEMY_CONN}
    AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW__CORE__FERNET_KEY}
    # Shared JWT secret for Airflow 3 Execution API auth.
    # Must be identical across api-server, scheduler, dag-processor, etc., otherwise tasks fail with:
    # "Invalid auth token: Signature verification failed"
    AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW__API_AUTH__JWT_SECRET}
    # Airflow 3 LocalExecutor workers call the "execution API" over HTTP.
    # If not set, it defaults to http://localhost:8080/execution/ which points at *itself* inside the scheduler container.
    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: http://airflow-api-server:8080/execution/
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__SIMPLE_AUTH_MANAGER__USERS: ${AIRFLOW__SIMPLE_AUTH_MANAGER__USERS}
    AIRFLOW__SIMPLE_AUTH_MANAGER__USERS_ADMIN: ${AIRFLOW__SIMPLE_AUTH_MANAGER__USERS_ADMIN}
    # dbt defaults write under the bind-mounted project; those dirs are often root-owned on Windows, so the airflow user cannot create dbt.log / target.
    DBT_LOG_PATH: /opt/airflow/logs/dbt_logs
    DBT_TARGET_PATH: /opt/airflow/logs/dbt_target
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/logs:/opt/airflow/logs
    - ./airflow/plugins:/opt/airflow/plugins
    - ./dbt:/opt/dbt
    - ./scripts:/opt/scripts
    - ./data:/opt/data
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:15
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}"]
      interval: 5s
      retries: 5

  airflow-init:
    <<: *airflow-common
    command: version
    environment:
      _AIRFLOW_DB_UPGRADE: 'true'

  airflow-api-server:
    <<: *airflow-common
    command: api-server
    ports:
      - "8080:8080"
    restart: always

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    restart: always

  airflow-dag-processor:
    <<: *airflow-common
    command: dag-processor
    restart: always

  python:
    build:
      context: ./docker
      dockerfile: Dockerfile.python
    env_file:
      - .env
    volumes:
      - ./scripts:/opt/scripts
      - ./data:/opt/data
    depends_on:
      - postgres

  dbt:
    build:
      context: ./docker
      dockerfile: Dockerfile.dbt
    env_file:
      - .env
    volumes:
      - ./dbt:/opt/dbt
    depends_on:
      - postgres

volumes:
  postgres_data: